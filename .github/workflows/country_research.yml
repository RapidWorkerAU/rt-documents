name: 03 - HSESC Country Compliance Sourcebook

on:
  workflow_dispatch:
    inputs:
      skip_matrix:
        description: 'Skip Phase 2 compliance matrix (use cache only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      skip_excel:
        description: 'Skip Phase 3+4 versioning and Excel build (use cache only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  research:
    name: Research and Build Sourcebook
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic openpyxl

      # ── One step + one commit per jurisdiction ─────────────────────────────

      - name: Research Guinea (GN)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/research_countries.py \
            --brief-dir briefs/ \
            --output-dir outputs/ \
            --phase 1 \
            --jurisdictions "GN"

      - name: Commit Guinea research
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add outputs/_country_profiles_cache.json
          git diff --staged --quiet || git commit -m "chore: Guinea (GN) research complete [skip ci]"
          git push

      - name: Research Western Australia (WA)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/research_countries.py \
            --brief-dir briefs/ \
            --output-dir outputs/ \
            --phase 1 \
            --jurisdictions "WA"

      - name: Commit Western Australia research
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add outputs/_country_profiles_cache.json
          git diff --staged --quiet || git commit -m "chore: Western Australia (WA) research complete [skip ci]"
          git push

      - name: Research Queensland (QLD)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/research_countries.py \
            --brief-dir briefs/ \
            --output-dir outputs/ \
            --phase 1 \
            --jurisdictions "QLD"

      - name: Commit Queensland research
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add outputs/_country_profiles_cache.json
          git diff --staged --quiet || git commit -m "chore: Queensland (QLD) research complete [skip ci]"
          git push

      - name: Research Argentina (AR)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/research_countries.py \
            --brief-dir briefs/ \
            --output-dir outputs/ \
            --phase 1 \
            --jurisdictions "AR"

      - name: Commit Argentina research
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add outputs/_country_profiles_cache.json
          git diff --staged --quiet || git commit -m "chore: Argentina (AR) research complete [skip ci]"
          git push

      - name: Research Canada Quebec (CA)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/research_countries.py \
            --brief-dir briefs/ \
            --output-dir outputs/ \
            --phase 1 \
            --jurisdictions "CA"

      - name: Commit Canada Quebec research
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add outputs/_country_profiles_cache.json
          git diff --staged --quiet || git commit -m "chore: Canada Quebec (CA) research complete [skip ci]"
          git push

      - name: Research Mongolia (MN)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/research_countries.py \
            --brief-dir briefs/ \
            --output-dir outputs/ \
            --phase 1 \
            --jurisdictions "MN"

      - name: Commit Mongolia research
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add outputs/_country_profiles_cache.json
          git diff --staged --quiet || git commit -m "chore: Mongolia (MN) research complete [skip ci]"
          git push

      - name: Research United States (US)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/research_countries.py \
            --brief-dir briefs/ \
            --output-dir outputs/ \
            --phase 1 \
            --jurisdictions "US"

      - name: Commit United States research
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add outputs/_country_profiles_cache.json
          git diff --staged --quiet || git commit -m "chore: United States (US) research complete [skip ci]"
          git push

      # ── Phase 2: Compliance matrix ─────────────────────────────────────────

      - name: Phase 2 — Compliance matrix
        if: ${{ github.event.inputs.skip_matrix != 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/research_countries.py \
            --brief-dir briefs/ \
            --output-dir outputs/ \
            --phase 2

      - name: Commit Phase 2 cache
        if: ${{ github.event.inputs.skip_matrix != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add outputs/_compliance_matrix_cache.json
          git diff --staged --quiet || git commit -m "chore: compliance matrix cache saved [skip ci]"
          git push

      # ── Phase 3+4: Versioning and Excel build ─────────────────────────────

      - name: Phase 3+4 — Versioning and Excel build
        if: ${{ github.event.inputs.skip_excel != 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/research_countries.py \
            --brief-dir briefs/ \
            --output-dir outputs/ \
            --phase 34

      - name: Commit final sourcebook
        if: ${{ github.event.inputs.skip_excel != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add outputs/HSESC_Country_Compliance_Sourcebook.xlsx
          git diff --staged --quiet || git commit -m "feat: HSESC country compliance sourcebook complete [skip ci]"
          git push

      - name: Done
        run: echo "All phases complete. Pull outputs/HSESC_Country_Compliance_Sourcebook.xlsx"
