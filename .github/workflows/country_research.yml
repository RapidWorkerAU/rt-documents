name: 03 - HSESC Country Compliance Sourcebook

on:
  workflow_dispatch:
    inputs:
      jurisdictions:
        description: 'Comma-separated jurisdictions to research (leave blank for all)'
        required: false
        default: 'all'

jobs:
  research:
    name: Research and Build Sourcebook
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic openpyxl

      - name: Run country research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/research_countries.py \
            --brief-dir briefs/ \
            --output-dir outputs/ \
            --jurisdictions "${{ github.event.inputs.jurisdictions }}"

      - name: Commit sourcebook
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/
          git diff --staged --quiet || git commit -m "feat: update HSESC country compliance sourcebook [skip ci]"
          git pull --rebase
          git push

      - name: Done
        run: |
          echo "Sourcebook complete. Check outputs/ folder."
