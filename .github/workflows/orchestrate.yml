name: 01 - Extract Briefs and Start Generation

on:
  workflow_dispatch:
    inputs:
      start_from:
        description: 'Start from procedure number (e.g. PRO-0001). Leave blank to start from the beginning.'
        required: false
        default: 'PRO-0001'
      dry_run:
        description: 'Dry run — extract briefs only, do not generate documents'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  extract-briefs:
    name: Extract Procedure Briefs from Playbook
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic python-docx

      - name: Extract procedure briefs from playbook
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/extract_briefs.py \
            --playbook inputs/playbook.docx \
            --output-dir briefs/

      - name: Commit extracted briefs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefs/
          git diff --staged --quiet || git commit -m "chore: extract procedure briefs from playbook [skip ci]"
          git push

      - name: Trigger first procedure generation
        if: ${{ github.event.inputs.dry_run == 'false' }}
        uses: actions/github-script@v7
        with:
          script: |
            const startFrom = '${{ github.event.inputs.start_from }}' || 'PRO-0001';
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'generate_procedure.yml',
              ref: 'main',
              inputs: {
                procedure_id: startFrom,
                triggered_by: 'orchestrate'
              }
            });
            console.log(`Triggered generation for ${startFrom}`);
